<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌊 2026 沖繩 11人團</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="沖繩2026">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdfdfd; -webkit-tap-highlight-color: transparent; }
        .day-tab.active { color: #0088cc; border-bottom: 3px solid #0088cc; font-weight: bold; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .itinerary-day { display: none; }
        .itinerary-day.active { display: block; }
        .btn-action { @apply flex flex-col items-center justify-center w-12 h-12 rounded-full bg-slate-50 text-slate-400 text-[10px] active:bg-sky-100; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .card { @apply bg-white p-4 rounded-xl shadow-sm border border-gray-100; }
    </style>
</head>
<body class="pb-24">

    <header class="p-5 text-center bg-white border-b relative">
        <div class="absolute left-4 top-5 opacity-30 text-sky-400 text-lg">🌊</div>
        <h1 class="text-lg font-bold tracking-widest uppercase">Okinawa Trip</h1>
        <div class="absolute right-4 top-5 opacity-30 text-orange-400 text-lg">☀️</div>
    </header>

    <div id="day-nav" class="sticky top-0 bg-white/90 backdrop-blur-md z-50 flex justify-between px-2 border-b text-xs overflow-x-auto shadow-sm">
        <button onclick="switchDay('d1')" class="day-tab py-4 px-3 active text-center">MON<br>4/6</button>
        <button onclick="switchDay('d2')" class="day-tab py-4 px-3 text-center">TUE<br>4/7</button>
        <button onclick="switchDay('d3')" class="day-tab py-4 px-3 text-center">WED<br>4/8</button>
        <button onclick="switchDay('d4')" class="day-tab py-4 px-3 text-center">THU<br>4/9</button>
        <button onclick="switchDay('d5')" class="day-tab py-4 px-3 text-center">FRI<br>4/10</button>
        <button onclick="switchDay('d6')" class="day-tab py-4 px-3 text-center">SAT<br>4/11</button>
    </div>

    <main class="p-4">
        <div id="itinerary-page" class="page-section active">
            <div id="d1" class="itinerary-day active space-y-3">
                <div class="schedule-item flex items-center justify-between card">
                    <div class="flex-1">
                        <b class="text-blue-500 text-xs">16:00</b>
                        <p class="text-sm font-medium">那霸機場取車 → 前往恩納</p>
                    </div>
                    <div class="flex gap-2 ml-4">
                        <a href="https://www.google.com/maps/search/那霸機場" class="btn-action"><i class="fa-solid fa-location-arrow text-sm"></i>導航</a>
                        <button class="btn-action"><i class="fa-solid fa-camera text-sm"></i>照片</button>
                    </div>
                </div>
                </div>
            </div>

        <div id="shopping-page" class="page-section">
            <h2 class="font-bold mb-4 ml-2 italic text-slate-400">Shopping List</h2>
            <div class="card p-10 text-center text-slate-300 border-dashed border-2">
                清單待補充...
            </div>
        </div>

        <div id="billing-page" class="page-section">
            <h2 class="font-bold mb-4 ml-2 italic text-slate-400">Expense Manager</h2>
            
            <div class="card space-y-4 mb-6">
                <div class="flex gap-2">
                    <input id="exp-name" type="text" placeholder="消費項目 (如：岸本食堂)" class="flex-1 border-b py-2 text-sm outline-none">
                    <select id="exp-currency" class="border-b text-sm font-bold text-sky-600 bg-transparent">
                        <option value="JPY">JPY ¥</option>
                        <option value="TWD">TWD $</option>
                    </select>
                </div>
                <input id="exp-amount" type="number" placeholder="輸入金額" class="w-full border-b py-2 text-lg font-bold outline-none">
                
                <div>
                    <p class="text-[10px] text-slate-400 mb-2 font-bold uppercase">誰要分擔？ (預設全員)</p>
                    <div id="memberChecklist" class="grid grid-cols-3 gap-2">
                        </div>
                </div>
                
                <button onclick="addExpense()" class="w-full bg-slate-800 text-white py-4 rounded-xl text-sm font-bold shadow-lg active:scale-95 transition">
                    新增這筆帳目
                </button>
            </div>

            <h3 class="text-xs font-bold text-slate-400 mb-2 ml-2">消費歷史紀錄</h3>
            <div id="expenseHistory" class="space-y-2">
                </div>
        </div>
    </main>

    <nav class="nav-bar flex justify-around py-3 shadow-xl">
        <button onclick="showPage('itinerary')" class="nav-btn flex flex-col items-center text-sky-600" id="nav-itinerary">
            <i class="fa-solid fa-calendar-alt text-lg"></i><span class="text-[10px]">行程</span>
        </button>
        <button onclick="showPage('shopping')" class="nav-btn flex flex-col items-center text-gray-400" id="nav-shopping">
            <i class="fa-solid fa-bag-shopping text-lg"></i><span class="text-[10px]">必買</span>
        </button>
        <button onclick="showPage('billing')" class="nav-btn flex flex-col items-center text-gray-400" id="nav-billing">
            <i class="fa-solid fa-wallet text-lg"></i><span class="text-[10px]">記帳</span>
        </button>
    </nav>

    <script>
        // 核心名單
        const members = ['David', 'Sherry', '鈺婷', '嘉', '信翰', '阿德', '小貞', '語彤', '宇詰', '竫椏', '亮勳'];

        // 初始化分帳成員清單
        function initMembers() {
            const container = document.getElementById('memberChecklist');
            members.forEach(m => {
                container.innerHTML += `
                    <label class="flex items-center gap-1 bg-slate-50 p-2 rounded text-[11px] border border-transparent active:border-sky-200">
                        <input type="checkbox" checked class="member-cb" value="${m}"> <span>${m}</span>
                    </label>
                `;
            });
        }

        // 分頁控制
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            
            // 處理底部導航顏色
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-sky-600', 'text-gray-400'));
            document.getElementById('nav-' + pageId).classList.replace('text-gray-400', 'text-sky-600');

            // 如果不是行程頁，隱藏頂部日期列
            document.getElementById('day-nav').style.display = (pageId === 'itinerary') ? 'flex' : 'none';
        }

        function switchDay(dayId) {
            document.querySelectorAll('.itinerary-day').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.day-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(dayId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 記帳邏輯
        let records = [];
        function addExpense() {
            const name = document.getElementById('exp-name').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            const currency = document.getElementById('exp-currency').value;
            const checkedMembers = Array.from(document.querySelectorAll('.member-cb:checked')).map(cb => cb.value);

            if (!name || !amount || checkedMembers.length === 0) {
                alert('請填寫完整資訊並選擇分擔成員！');
                return;
            }

            const perPerson = (amount / checkedMembers.length).toFixed(0);
            const record = { name, amount, currency, members: checkedMembers, perPerson };
            records.unshift(record);
            renderRecords();
            
            // 清空輸入
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-amount').value = '';
        }

        function renderRecords() {
            const container = document.getElementById('expenseHistory');
            container.innerHTML = records.map(r => `
                <div class="card !p-3 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-bold">${r.name}</p>
                        <p class="text-[10px] text-slate-400">分擔：${r.members.join(', ')}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-sky-600">${r.currency} ${r.amount}</p>
                        <p class="text-[10px] text-orange-500">每人份：${r.perPerson}</p>
                    </div>
                </div>
            `).join('');
        }

        initMembers();
    </script>
</body>
</html>
